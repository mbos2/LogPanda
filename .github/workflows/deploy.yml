name: Deploy LogPanda

on:
  push:
    branches:
      - dev
      - staging
      - prod

  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        type: choice
        options:
          - dev
          - staging
          - production

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || github.ref_name == 'dev' && 'dev' || github.ref_name == 'staging' && 'staging' || github.ref_name == 'prod' && 'production' || 'dev' }}

    env:
      DEPLOY_ENV: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || github.ref_name == 'dev' && 'dev' || github.ref_name == 'staging' && 'staging' || github.ref_name == 'prod' && 'production' || 'dev' }}
      FRONTEND_BASE_URL: ${{ vars.FRONTEND_BASE_URL }}
      SES_VERIFIED_DOMAIN: ${{ vars.SES_VERIFIED_DOMAIN }}
      SES_FROM_EMAIL: ${{ vars.SES_FROM_EMAIL }}
      SES_FROM_NAME: ${{ vars.SES_FROM_NAME }}
      SES_REPLY_TO_EMAIL: ${{ vars.SES_REPLY_TO_EMAIL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build backend
        run: pnpm --filter backend build

      - name: Install CDK
        run: npm install -g aws-cdk

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy
        run: |
          cd infra
          cdk deploy -c env=$DEPLOY_ENV --require-approval never